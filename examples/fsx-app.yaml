---
# FSx Lustre CSI Driver Test Examples
# High-performance parallel filesystem for GPU/ML workloads with EFA
#
# Prerequisites:
#   1. Install FSx CSI Driver:
#      INSTALL_DRIVERS=fsx ./scripts/legacy/option_install_csi_drivers.sh
#   2. Create FSx Lustre filesystem with PERSISTENT_2 deployment type
#   3. Install lustre-client on GPU nodes (required for AL2023)
#   4. GPU node group deployed with EFA enabled
#
# IMPORTANT: Lustre Version Compatibility
#   - AL2023 lustre-client version: 2.15.x
#   - FSx SCRATCH_2 server version: 2.10.x (INCOMPATIBLE)
#   - FSx PERSISTENT_2 server version: 2.15.x (COMPATIBLE)
#
#   Use PERSISTENT_2 deployment type for AL2023 nodes!
#
# Create FSx Lustre (PERSISTENT_2 with EFA-optimized throughput):
#   aws fsx create-file-system \
#     --file-system-type LUSTRE \
#     --storage-capacity 1200 \
#     --subnet-ids subnet-xxx \
#     --security-group-ids sg-xxx \
#     --lustre-configuration '{
#       "DeploymentType": "PERSISTENT_2",
#       "PerUnitStorageThroughput": 250,
#       "DataCompressionType": "LZ4"
#     }' \
#     --tags Key=Name,Value=${CLUSTER_NAME}-fsx \
#     --region ${AWS_REGION}
#
# Install lustre-client on GPU nodes (via SSM):
#   INSTANCE_ID=<gpu-node-instance-id>
#   aws ssm send-command --instance-ids "${INSTANCE_ID}" \
#     --document-name "AWS-RunShellScript" \
#     --parameters 'commands=["dnf install -y lustre-client && modprobe lustre"]' \
#     --region ${AWS_REGION}
#
# Quick Test:
#   # Set variables
#   export FSX_ID=fs-xxxxxxxxxxxxxxxxx
#   export FSX_DNS=fs-xxx.fsx.region.amazonaws.com
#   export FSX_MOUNT_NAME=xxxxx
#
#   # Apply manifests
#   envsubst < examples/fsx-app.yaml | kubectl apply -f -
#
#   # Verify
#   kubectl get pv,pvc | grep fsx
#   kubectl get pods fsx-test-1 fsx-test-2 -o wide
#   kubectl logs fsx-test-1
#
#   # Cleanup
#   kubectl delete pod fsx-test-1 fsx-test-2
#   kubectl delete pvc fsx-claim
#   kubectl delete pv fsx-pv

# ============================================
# FSx Lustre PV (Static Provisioning)
# ============================================
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: fsx-pv
spec:
  capacity:
    storage: 1200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: fsx.csi.aws.com
    volumeHandle: ${FSX_ID}
    volumeAttributes:
      dnsname: ${FSX_DNS}
      mountname: ${FSX_MOUNT_NAME}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fsx-claim
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 1200Gi
  volumeName: fsx-pv

# ============================================
# Test Pods - GPU nodes with EFA support
# ============================================
---
apiVersion: v1
kind: Pod
metadata:
  name: fsx-test-1
  labels:
    app: fsx-test
spec:
  nodeSelector:
    workload-type: gpu
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
  - name: app
    image: public.ecr.aws/amazonlinux/amazonlinux:2023
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== FSx Lustre Test - Pod 1 (GPU Node) ==="
        echo "Node: $(hostname)"
        echo ""
        echo "Writing 100MB test file..."
        dd if=/dev/zero of=/data/testfile bs=1M count=100
        echo ""
        echo "File created:"
        ls -lh /data/
        echo ""
        echo "Mount info:"
        df -h /data
        echo ""
        echo "Test complete. Sleeping..."
        sleep infinity
    volumeMounts:
    - name: fsx-storage
      mountPath: /data
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  volumes:
  - name: fsx-storage
    persistentVolumeClaim:
      claimName: fsx-claim
---
apiVersion: v1
kind: Pod
metadata:
  name: fsx-test-2
  labels:
    app: fsx-test
spec:
  nodeSelector:
    workload-type: gpu
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
  - name: app
    image: public.ecr.aws/amazonlinux/amazonlinux:2023
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "=== FSx Lustre Test - Pod 2 (GPU Node) ==="
        echo "Node: $(hostname)"
        echo ""
        sleep 15
        echo "Verifying shared file from Pod 1..."
        ls -lh /data/
        echo ""
        echo "File checksum:"
        md5sum /data/testfile
        echo ""
        echo "Test complete. Sleeping..."
        sleep infinity
    volumeMounts:
    - name: fsx-storage
      mountPath: /data
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  volumes:
  - name: fsx-storage
    persistentVolumeClaim:
      claimName: fsx-claim
