apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlb-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nlb-test
  template:
    metadata:
      labels:
        app: nlb-test
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nlb-test-svc
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internal
spec:
  type: LoadBalancer
  selector:
    app: nlb-test
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
